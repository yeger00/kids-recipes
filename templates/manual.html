<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{MANUAL_TITLE}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 22px;
      background: #f0f8ff;
      color: #333;
      padding: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      text-align: center;
      color: #2e7bcf;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 1.3rem;
      color: #5a7ea0;
      margin-bottom: 12px;
      border-bottom: 2px dashed #b3d4f0;
      padding-bottom: 6px;
    }

    section { margin-bottom: 24px; }

    .source-link {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    .source-link a { color: #2e7bcf; text-decoration: none; }
    .source-link a:hover { text-decoration: underline; }
    @media print { .source-link { display: none; } }

    /* Shared card grid */
    .materials-grid, .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    /* Shared card style */
    .material-card, .tool-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .material-card { border: 2px solid #ffe0b2; }
    .tool-card     { border: 2px solid #b3e0ff; }

    .material-card.checked { background: #e8f5e9; border-color: #81c784; }
    .tool-card.checked     { background: #e8f5e9; border-color: #81c784; }

    .material-card.checked .card-name,
    .material-card.checked .card-amount,
    .tool-card.checked .card-name {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .material-card img, .material-card .icon-placeholder,
    .tool-card img, .tool-card .icon-placeholder {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    .icon-placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border-radius: 50%;
      font-size: 1.8rem;
      color: #aaa;
    }

    .checkmark {
      font-size: 1.5rem;
      height: 28px;
      margin-bottom: 4px;
      color: #81c784;
      visibility: hidden;
    }

    .material-card.checked .checkmark,
    .tool-card.checked .checkmark { visibility: visible; }

    .card-amount { font-size: 0.85rem; color: #888; margin-bottom: 4px; }
    .card-name   { font-size: 0.95rem; font-weight: bold; color: #555; }

    /* Steps */
    .steps-list { list-style: none; counter-reset: steps; }

    .steps-list li {
      counter-increment: steps;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
      background: #fff;
      border: 2px solid #dbeafe;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .steps-list li.checked { background: #f1f8e9; }

    .step-number {
      font-size: 1.4rem;
      font-weight: bold;
      color: #5b9bd5;
      min-width: 32px;
      line-height: 1.4;
    }

    .step-number::before { content: counter(steps); }

    .step-check {
      font-size: 1.2rem;
      color: #81c784;
      min-width: 24px;
      visibility: hidden;
    }

    .steps-list li.checked .step-check { visibility: visible; }

    .step-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .step-text { line-height: 1.6; font-size: 1rem; }

    .step-materials { display: flex; flex-wrap: wrap; gap: 6px; }

    .step-material-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f8ff;
      border: 1px solid #b3d4f0;
      border-radius: 20px;
      padding: 3px 10px 3px 6px;
      font-size: 0.78rem;
      color: #2e6da4;
    }

    .step-material-tag img { width: 26px; height: 26px; object-fit: contain; }

    .step-image {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 12px;
      flex-shrink: 0;
      align-self: center;
    }

    /* ── Print styles ───────────────────────────────────────── */
    @media print {
      body { background: #fff; padding: 12px; }

      .materials-grid, .tools-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .material-card, .tool-card {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        text-align: right;
        cursor: default;
        transition: none;
        break-inside: avoid;
      }

      .material-card img, .material-card .icon-placeholder,
      .tool-card img, .tool-card .icon-placeholder {
        width: 40px;
        height: 40px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .checkmark, .step-check {
        visibility: visible;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        min-width: 32px;
        border: 2px solid #aaa;
        border-radius: 4px;
        color: transparent;
        font-size: 1.2rem;
        flex-shrink: 0;
        margin-bottom: 0;
      }

      .card-amount, .card-name { margin-bottom: 0; text-align: right; }

      .material-card.checked .checkmark,
      .tool-card.checked .checkmark,
      .steps-list li.checked .step-check { color: #333; border-color: #5a9e6f; }

      .material-card.checked, .tool-card.checked,
      .steps-list li.checked { background: #f5f5f5; }

      .steps-list li { cursor: default; transition: none; break-inside: avoid; }

      .step-material-tag { border-color: #ccc; background: #fafafa; }

      .step-image { width: 80px; height: 80px; }
    }
  </style>
</head>
<body>

  <h1>{{MANUAL_TITLE}}</h1>
  {{SOURCE_LINK}}

  <section>
    <h2>🔧 חומרים</h2>
    <div class="materials-grid">
      {{MATERIAL_CARDS}}
    </div>
  </section>

  <section>
    <h2>🛠️ כלים</h2>
    <div class="tools-grid">
      {{TOOL_CARDS}}
    </div>
  </section>

  <section>
    <h2>👷 הוראות ביצוע</h2>
    <ol class="steps-list">
      {{STEP_ITEMS}}
      <!-- Each step item:
      <li onclick="this.classList.toggle('checked')">
        <span class="step-number"></span>
        <span class="step-check">✔</span>
        <div class="step-body">
          <span class="step-text">STEP TEXT</span>
          <div class="step-materials">
            <span class="step-material-tag">
              <img src="../icons-db/icons/ICON_FILE" alt="NAME">NAME
            </span>
          </div>
        </div>
        <img class="step-image" src="../icons-db/steps/SLUG-step-N.png" alt="שלב N">
      </li>
      -->
    </ol>
  </section>

</body>
</html>
